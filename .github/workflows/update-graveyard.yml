name: Update Startup Graveyard

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Least privilege for auto-commit of data/graveyard.json only.
# Contents write is required by git-auto-commit-action.
permissions:
  contents: write

concurrency:
  group: update-graveyard
  cancel-in-progress: true

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run automation pipeline
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL: ${{ vars.NVIDIA_MODEL || 'meta/llama-3.1-70b-instruct' }}
          MAX_NEW_STARTUPS_PER_RUN: ${{ vars.MAX_NEW_STARTUPS_PER_RUN || '5' }}
        run: python -m pipeline.run

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): automated graveyard refresh"
          file_pattern: data/graveyard.json
          # Never commit secrets or caches if they appear untracked
          skip_dirty_check: false

      - name: Deploy to Vercel
        # secrets.* always string; empty secret means skip deploy step
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: "--prod"
