<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bharat Startup Reality">
  <!-- Ultra-clear tab icon: tombstone + rebuild arrow + B mark -->
  <defs>
    <clipPath id="r">
      <rect x="2" y="2" width="60" height="60" rx="12"/>
    </clipPath>
  </defs>
  <!-- Outer frame -->
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#f4efe4"/>
  <!-- India stripe (left) -->
  <g clip-path="url(#r)">
    <rect x="2" y="2" width="5" height="60" fill="#FF9933"/>
    <rect x="7" y="2" width="3.5" height="60" fill="#FFFFFF"/>
    <rect x="10.5" y="2" width="3.5" height="60" fill="#138808"/>
  </g>
  <!-- Tombstone -->
  <path fill="#0a0a0a" d="
    M20 50
    V28
    a12 12 0 0 1 24 0
    V50
    H20 Z"/>
  <!-- Rebuild arrow (cyan) — bold for 16px -->
  <path fill="#00B4FF" d="
    M22.5 46
    L40 28.5
    L36.2 24.7
    L48.5 22
    L45.8 34.3
    L42 30.5
    L24.5 48
    Z"/>
  <!-- Amber B badge -->
  <rect x="46" y="46" width="12" height="12" rx="2.5" fill="#FFB300" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="52" y="55.2" text-anchor="middle" font-family="Inter, system-ui, Arial, sans-serif"
    font-size="9" font-weight="900" fill="#0a0a0a">B</text>
</svg>
