  <rect x="1.5" y="1.5" width="29" height="29" rx="4.5" fill="#f5f3eb"/>
  <!-- Bharat tricolor edge -->
  <rect x="1.5" y="1.5" width="2.8" height="9.7" fill="#FF9933"/>
  <rect x="1.5" y="11.2" width="2.8" height="9.6" fill="#FFFFFF"/>
  <rect x="1.5" y="20.8" width="2.8" height="9.7" fill="#138808"/>
  <!-- Tombstone (downtrend / reality) -->
  <path fill="#101010" d="
    M8.2 25.6 V12.8
    c0-0.4 0.15-1.6 1.1-2.7 0.85-1 2.15-1.6 3.7-1.6
    c1.2 0 2.25 0.35 3.05 0.95 0.55 0.4 0.95 0.9 1.2 1.35
    L19.5 8.2 l1.35 1.2 -2.05 2.35
    c0.2 0.55 0.3 1.15 0.3 1.8 V25.6 H8.2 Z"/>
