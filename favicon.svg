<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bharat Startup Reality">
  <!-- Monochrome mark: black frame, white field, black tombstone, white arrow, black B on white badge -->
  <defs>
    <clipPath id="r">
      <rect x="2" y="2" width="60" height="60" rx="12"/>
    </clipPath>
  </defs>
  <rect width="64" height="64" rx="14" fill="#000000"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#FFFFFF"/>
  <!-- subtle left edge accent (black bar) -->
  <g clip-path="url(#r)">
    <rect x="2" y="2" width="4" height="60" fill="#000000"/>
  </g>
  <!-- Tombstone -->
  <path fill="#000000" d="
    M20 50
    V28
    a12 12 0 0 1 24 0
    V50
    H20 Z"/>
  <!-- Rebuild arrow (white on black tombstone) -->
  <path fill="#FFFFFF" d="
    M22.5 46
    L40 28.5
    L36.2 24.7
    L48.5 22
    L45.8 34.3
    L42 30.5
    L24.5 48
    Z"/>
  <!-- B badge: black border, white fill, black B -->
  <rect x="46" y="46" width="12" height="12" rx="2.5" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>
  <text x="52" y="55.2" text-anchor="middle" font-family="Inter, system-ui, Arial, sans-serif"
    font-size="9" font-weight="900" fill="#000000">B</text>
</svg>
